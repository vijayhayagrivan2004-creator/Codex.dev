  <meta name="description" content="Codex.dev — From Idea to Website. Clean, responsive, and modern websites for individuals and small businesses. Built by Vijayhayagrivan." />
  <title>Codex.dev — From Idea to Website</title>

  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --accent: #8b5cf6;
      --bg-dark: #0f172a;
      --sidebar-bg: #1e293b;
      --card-bg: rgba(30, 41, 59, 0.7);
      --text-main: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --glass-border: rgba(255, 255, 255, 0.1);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      overflow-x: hidden;
      line-height: 1.6;
    }

    h1, h2, h3, .logo-text { font-family: 'Poppins', sans-serif; }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { background: var(--sidebar-bg); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

    /* Layout */
    .app-container { display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: var(--sidebar-bg);
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      display: flex;
      flex-direction: column;
      padding: 2rem 1.5rem;
      border-right: 1px solid var(--glass-border);
      z-index: 1000;
      transition: var(--transition);
    }

    .sidebar-header { display: flex; align-items: center; gap: 12px; margin-bottom: 3rem; }
    .logo-icon { 
      background: var(--primary); 
      width: 40px; height: 40px; 
      display: flex; align-items: center; justify-content: center; 
      font-weight: 800; border-radius: 10px; font-size: 1.2rem;
    }
    .logo-text { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.5px; }
    .logo-text span { color: var(--primary); }

    .nav-section-label { color: var(--text-muted); text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1.5px; margin: 1.5rem 0 0.75rem 0.5rem; }
    .nav-item {
      display: flex; align-items: center; gap: 15px;
      padding: 12px 15px; border-radius: 12px;
      color: var(--text-secondary); text-decoration: none;
      margin-bottom: 5px; cursor: pointer; transition: var(--transition);
    }
    .nav-item:hover, .nav-item.active { background: rgba(99, 102, 241, 0.1); color: var(--primary); }
    .nav-item i { width: 20px; font-size: 1.1rem; }

    .sidebar-footer { margin-top: auto; padding-top: 2rem; border-top: 1px solid var(--glass-border); }
    .user-profile { display: flex; align-items: center; gap: 12px; }
    .user-avatar { width: 40px; height: 40px; border-radius: 10px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 700; }
    .user-info span { display: block; font-size: 0.85rem; font-weight: 600; }
    .user-info small { color: var(--text-muted); font-size: 0.75rem; }

    /* Main Content */
    .main-content { margin-left: 280px; flex: 1; min-height: 100vh; position: relative; }
    .page { display: none; padding: 3rem; animation: fadeIn 0.4s ease; max-width: 1200px; margin: 0 auto; }
    .page.active { display: block; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
